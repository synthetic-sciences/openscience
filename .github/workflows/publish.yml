name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

# One release at a time. Keying the group on the inputs let a `patch` and a
# `minor` dispatch run concurrently and race on tags and the GitHub release.
concurrency: ${{ github.workflow }}

permissions:
  id-token: write
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'synthetic-sciences/OpenScience'
    steps:
      - name: Require a bump or version input
        if: ${{ !inputs.bump && !inputs.version }}
        run: |
          echo "::error::Provide 'bump' or 'version'. An empty dispatch would publish a 0.0.0-main preview to npm as if it were a release."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - id: version
        run: ./tooling/repo/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          OPENSCIENCE_BUMP: ${{ inputs.bump }}
          OPENSCIENCE_VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        run: ./backend/cli/script/build.ts
        env:
          OPENSCIENCE_VERSION: ${{ needs.version.outputs.version }}
          OPENSCIENCE_RELEASE: ${{ needs.version.outputs.release }}
          GH_TOKEN: ${{ github.token }}

      - name: Cache CLI build
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: backend/cli/dist
          key: cli-build-${{ github.run_id }}

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup git committer
        run: |
          git config user.email "openscience@syntheticsciences.dev"
          git config user.name "openscience"

      - name: Restore CLI build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: backend/cli/dist
          key: cli-build-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Publish
        run: ./tooling/repo/publish.ts
        env:
          HUSKY: "0"
          OPENSCIENCE_VERSION: ${{ needs.version.outputs.version }}
          OPENSCIENCE_RELEASE: ${{ needs.version.outputs.release }}
          GITHUB_TOKEN: ${{ github.token }}
          # Fine-grained PAT with push access to synthetic-sciences/homebrew-tap;
          # github.token is repo-scoped and can't update the tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  # Record the npm release as a GitHub deployment so it shows up in the
  # repo's Deployments sidebar next to the Vercel Production/Preview entries.
  deployment:
    needs:
      - version
      - publish
    # Previews (no release output) shouldn't create a production deployment.
    if: needs.version.outputs.release != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      deployments: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
        with:
          script: |
            const version = process.env.VERSION
            const deployment = await github.rest.repos.createDeployment({
              ...context.repo,
              // The tag points at the release commit (the tree that was
              // actually published); context.sha is the pre-release commit.
              ref: process.env.TAG || context.sha,
              environment: "npm",
              auto_merge: false,
              required_contexts: [],
              description: `@synsci/openscience ${version}`,
              production_environment: true,
            })
            await github.rest.repos.createDeploymentStatus({
              ...context.repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: `https://www.npmjs.com/package/@synsci/openscience/v/${version}`,
              description: `Published @synsci/openscience@${version}`,
            })
