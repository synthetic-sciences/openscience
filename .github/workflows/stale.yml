name: Stale

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          days-before-stale: 90
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          remove-stale-when-updated: true
          exempt-issue-labels: "pinned,security,feature-request,on-hold"
          exempt-pr-labels: "pinned,security,on-hold"
          stale-issue-message: >
            [automated] This issue has had no activity for 90 days. It will be
            closed in 7 days if there is no new activity. Reopen anytime if you
            still need it.
          close-issue-message: >
            [automated] Closing after 90+ days of inactivity. Feel free to reopen.
          stale-pr-message: >
            [automated] This pull request has had no activity for 90 days. It
            will be closed in 7 days if there is no new activity.
          close-pr-message: >
            [automated] Closing after 90+ days of inactivity. Feel free to reopen.
